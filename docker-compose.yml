version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babyhealth-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DEBUG=false
      - STORAGE_TYPE=json
      - CORS_ALLOWED_ORIGINS=["http://localhost:5173", "http://localhost:3000", "http://localhost:8080"]
    volumes:
      - ./backend:/app/backend
      - ./frontend/dist:/app/frontend/dist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - babyhealth-network

  # Optional: Nginx reverse proxy (for production-like setup)
  # nginx:
  #   image: nginx:alpine
  #   container_name: babyhealth-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - babyhealth-network

networks:
  babyhealth-network:
    driver: bridge

# Volume mounts for development
volumes:
  backend-data:
  frontend-dist:
