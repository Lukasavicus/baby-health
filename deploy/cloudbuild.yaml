# Cloud Build: build image → push to Artifact Registry → deploy to Cloud Run
# Triggered on push to main via google_cloudbuild_trigger (Terraform)

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/babyhealth:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/babyhealth:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/babyhealth']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'babyhealth'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/babyhealth:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--set-env-vars=STORAGE_TYPE=gcs,GCS_BUCKET=${_DATA_BUCKET},BABYHEALTH_USE_UI_SEED=1,DEBUG=false'
      - '--set-secrets=JWT_SECRET=babyhealth-jwt-secret:latest'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=2'
      - '--allow-unauthenticated'
      - '--quiet'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/babyhealth:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/babyhealth:latest'

substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REPO: 'babyhealth'
  _DATA_BUCKET: 'baby-health-492304-data'
  _SERVICE_ACCOUNT: 'babyhealth-run@baby-health-492304.iam.gserviceaccount.com'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
